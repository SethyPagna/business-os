<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a8a" />
    <meta name="description" content="Business OS - Offline-first POS, inventory and analytics" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <title>Business OS</title>
    <script>
      function suppressInjectedRuntimeNoise(message) {
        var msg = String(message || '')
        return (
          msg.indexOf('No Listener: tabs:outgoing.message.ready') !== -1 ||
          msg.indexOf('tabs:outgoing.message.ready') !== -1 ||
          msg.indexOf('Could not establish connection. Receiving end does not exist.') !== -1 ||
          msg.indexOf('Receiving end does not exist') !== -1 ||
          msg.indexOf("Content Security Policy of your site blocks the use of 'eval' in JavaScript") !== -1 ||
          msg.indexOf("Evaluating a string as JavaScript violates the following Content Security Policy directive") !== -1 ||
          msg.indexOf("'unsafe-eval' is not an allowed source of script") !== -1 ||
          (msg.indexOf('cssRules') !== -1 && msg.indexOf('null') !== -1) ||
          msg.indexOf("The play() request was interrupted by a call to pause()") !== -1
        )
      }

      ;(function patchConsoleRuntimeNoise() {
        var consoleMethods = ['error', 'warn']
        for (var i = 0; i < consoleMethods.length; i += 1) {
          var method = consoleMethods[i]
          var original = window.console && window.console[method]
          if (typeof original !== 'function') continue
          window.console[method] = (function(fn) {
            return function() {
              var firstArg = arguments.length ? arguments[0] : ''
              var text = String(firstArg && firstArg.message ? firstArg.message : firstArg || '')
              if (suppressInjectedRuntimeNoise(text)) return
              return fn.apply(this, arguments)
            }
          })(original)
        }
      })()

      window.addEventListener('unhandledrejection', function(e) {
        var msg = (e && e.reason && e.reason.message) ? e.reason.message : String((e && e.reason) || '')
        if (
          suppressInjectedRuntimeNoise(msg) ||
          msg.indexOf('No Listener:') !== -1 ||
          msg.indexOf('tabs:outgoing') !== -1 ||
          msg.indexOf('capacitor') !== -1 ||
          msg.indexOf('plugin_not_implemented') !== -1 ||
          msg.indexOf('Capacitor') !== -1 ||
          msg.indexOf('Receiving end does not exist') !== -1
        ) {
          e.preventDefault()
          if (e.stopImmediatePropagation) e.stopImmediatePropagation()
        }
      }, true)

      window.addEventListener('error', function(e) {
        var target = e && e.target
        var isResource = !!(target && (target.tagName === 'LINK' || target.tagName === 'SCRIPT'))
        var msg = String((e && e.message) || '')
        if (!msg && e && e.error && e.error.message) msg = String(e.error.message)

        if (suppressInjectedRuntimeNoise(msg)) {
          e.preventDefault()
          if (e.stopImmediatePropagation) e.stopImmediatePropagation()
          return
        }

        if (isResource && target && target.tagName === 'LINK') {
          var href = String(target.getAttribute('href') || '')
          if (href.indexOf('/assets/') !== -1 && href.indexOf('.css') !== -1) {
            e.preventDefault()
            if (e.stopImmediatePropagation) e.stopImmediatePropagation()
          }
        }
      }, true)

      try {
        var settings = localStorage.getItem('businessos_settings')
        if (settings) {
          var parsed = JSON.parse(settings)
          if (parsed && parsed.theme === 'dark') document.documentElement.classList.add('dark')
        }
        if (localStorage.getItem('businessos_theme') === 'dark') {
          document.documentElement.classList.add('dark')
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
