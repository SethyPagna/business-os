<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a8a" />
    <meta name="description" content="Business OS - Offline-first POS, inventory and analytics" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <title>Business OS</title>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Poppins:wght@300;400;500;600;700&family=Open+Sans:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Hanuman:wght@400;700&family=Battambang:wght@400;700&family=Noto+Sans+Khmer:wght@400;500;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Poppins:wght@300;400;500;600;700&family=Open+Sans:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Hanuman:wght@400;700&family=Battambang:wght@400;700&family=Noto+Sans+Khmer:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      function suppressInjectedRuntimeNoise(message) {
        var msg = String(message || '')
        return (
          msg.indexOf('No Listener: tabs:outgoing.message.ready') !== -1 ||
          msg.indexOf('tabs:outgoing.message.ready') !== -1 ||
          (msg.indexOf('cssRules') !== -1 && msg.indexOf('null') !== -1) ||
          msg.indexOf("The play() request was interrupted by a call to pause()") !== -1
        )
      }

      window.addEventListener('unhandledrejection', function(e) {
        var msg = (e && e.reason && e.reason.message) ? e.reason.message : String((e && e.reason) || '')
        if (
          suppressInjectedRuntimeNoise(msg) ||
          msg.indexOf('No Listener:') !== -1 ||
          msg.indexOf('tabs:outgoing') !== -1 ||
          msg.indexOf('capacitor') !== -1 ||
          msg.indexOf('plugin_not_implemented') !== -1 ||
          msg.indexOf('Capacitor') !== -1
        ) {
          e.preventDefault()
          if (e.stopImmediatePropagation) e.stopImmediatePropagation()
        }
      }, true)

      window.addEventListener('error', function(e) {
        var target = e && e.target
        var isResource = !!(target && (target.tagName === 'LINK' || target.tagName === 'SCRIPT'))
        var msg = String((e && e.message) || '')
        if (!msg && e && e.error && e.error.message) msg = String(e.error.message)

        if (suppressInjectedRuntimeNoise(msg)) {
          e.preventDefault()
          if (e.stopImmediatePropagation) e.stopImmediatePropagation()
          return
        }

        if (isResource && target && target.tagName === 'LINK') {
          var href = String(target.getAttribute('href') || '')
          if (href.indexOf('/assets/') !== -1 && href.indexOf('.css') !== -1) {
            e.preventDefault()
            if (e.stopImmediatePropagation) e.stopImmediatePropagation()
          }
        }
      }, true)

      try {
        var settings = localStorage.getItem('businessos_settings')
        if (settings) {
          var parsed = JSON.parse(settings)
          if (parsed && parsed.theme === 'dark') document.documentElement.classList.add('dark')
        }
        if (localStorage.getItem('businessos_theme') === 'dark') {
          document.documentElement.classList.add('dark')
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
