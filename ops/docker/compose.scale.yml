name: business-os

x-service-logging: &service-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-node-env: &node-env
  NODE_ENV: production
  PORT: "${PORT:-4000}"
  NODE_OPTIONS: "${NODE_OPTIONS:---max-old-space-size=512}"
  BUSINESS_OS_REQUIRE_SCALE_SERVICES: "1"
  BUSINESS_OS_REMOTE_PROVIDER: "${BUSINESS_OS_REMOTE_PROVIDER:-cloudflare}"
  PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-https://leangcosmetics.dpdns.org}"
  CLOUDFLARE_PUBLIC_URL: "${CLOUDFLARE_PUBLIC_URL:-https://leangcosmetics.dpdns.org}"
  CLOUDFLARE_ADMIN_URL: "${CLOUDFLARE_ADMIN_URL:-https://admin.leangcosmetics.dpdns.org}"
  JOB_QUEUE_DRIVER: bullmq
  REDIS_URL: redis://redis-queue:6379
  RUNTIME_CACHE_ENABLED: "${RUNTIME_CACHE_ENABLED:-1}"
  CACHE_REDIS_URL: redis://redis-cache:6379
  DATABASE_DRIVER: "${DATABASE_DRIVER:-postgres}"
  DATABASE_URL: "${DATABASE_URL:-postgres://business_os:businessos-dev-password@postgres:5432/business_os}"
  OBJECT_STORAGE_DRIVER: "${OBJECT_STORAGE_DRIVER:-r2}"
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-businessos}"
  S3_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-businessos-dev-password}"
  S3_BUCKET: "${S3_BUCKET:-business-os-assets}"
  IMPORT_QUEUE_CONCURRENCY: "${IMPORT_QUEUE_CONCURRENCY:-1}"
  MEDIA_QUEUE_CONCURRENCY: "${MEDIA_QUEUE_CONCURRENCY:-2}"
  IMPORT_ROW_BATCH_SIZE: "${IMPORT_ROW_BATCH_SIZE:-400}"
  IMPORT_BATCH_PAUSE_MS: "${IMPORT_BATCH_PAUSE_MS:-50}"
  GOOGLE_LOGIN_CLIENT_ID: "${GOOGLE_LOGIN_CLIENT_ID:-784691087631-2ugaidgt6umv80i9qvfo08ddu12n4a9b.apps.googleusercontent.com}"
  GOOGLE_LOGIN_CLIENT_SECRET: "${GOOGLE_LOGIN_CLIENT_SECRET:-}"
  GOOGLE_LOGIN_CLIENT_SECRET_FILE: "${GOOGLE_LOGIN_CLIENT_SECRET_FILE:-ops/runtime/secrets/google-login-client-secret.txt}"
  GOOGLE_LOGIN_REDIRECT_URI: "${GOOGLE_LOGIN_REDIRECT_URI:-https://admin.leangcosmetics.dpdns.org/api/auth/oauth/callback}"
  GOOGLE_DRIVE_CLIENT_ID: "${GOOGLE_DRIVE_CLIENT_ID:-}"
  GOOGLE_DRIVE_CLIENT_SECRET: "${GOOGLE_DRIVE_CLIENT_SECRET:-}"
  GOOGLE_DRIVE_OAUTH_REDIRECT_URI: "${GOOGLE_DRIVE_OAUTH_REDIRECT_URI:-}"
  IMPORT_IMAGE_CONCURRENCY: "${IMPORT_IMAGE_CONCURRENCY:-3}"
  MEDIA_IMAGE_MAX_WIDTH: "${MEDIA_IMAGE_MAX_WIDTH:-1600}"
  MEDIA_IMAGE_QUALITY: "${MEDIA_IMAGE_QUALITY:-72}"
  UPLOAD_CHUNK_MB: "${UPLOAD_CHUNK_MB:-12}"
  SEARCH_CACHE_TTL_SECONDS: "${SEARCH_CACHE_TTL_SECONDS:-15}"
  POSTGRES_ENABLE_SEARCH_EXTENSIONS: "${POSTGRES_ENABLE_SEARCH_EXTENSIONS:-1}"

services:
  redis-queue:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "60"
      - "1000"
      - --maxmemory
      - "${REDIS_QUEUE_MAX_MEMORY:-1536mb}"
      - --maxmemory-policy
      - noeviction
      - --tcp-keepalive
      - "60"
      - --timeout
      - "0"
    restart: unless-stopped
    ports:
      - "${REDIS_QUEUE_BIND_HOST:-127.0.0.1}:${REDIS_QUEUE_PORT:-6379}:6379"
    volumes:
      - business_os_redis_queue:/data
    networks:
      - business_os_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    mem_limit: "${REDIS_QUEUE_MEMORY_LIMIT:-1536m}"
    cpus: "${REDIS_QUEUE_CPUS:-1.0}"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging: *service-logging

  redis-cache:
    image: redis:7-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - "${REDIS_CACHE_MAX_MEMORY:-768mb}"
      - --maxmemory-policy
      - allkeys-lru
      - --tcp-keepalive
      - "60"
      - --timeout
      - "0"
    restart: unless-stopped
    ports:
      - "${REDIS_CACHE_BIND_HOST:-127.0.0.1}:${REDIS_CACHE_PORT:-6380}:6379"
    networks:
      - business_os_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    mem_limit: "${REDIS_CACHE_MEMORY_LIMIT:-768m}"
    cpus: "${REDIS_CACHE_CPUS:-0.5}"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging: *service-logging

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-business_os}"
      POSTGRES_USER: "${POSTGRES_USER:-business_os}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-business_os_dev_password}"
      PGDATA: /var/lib/postgresql/data
    command:
      - postgres
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-1GB}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-3GB}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-32MB}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-512MB}
      - -c
      - max_wal_size=${POSTGRES_MAX_WAL_SIZE:-4GB}
      - -c
      - checkpoint_timeout=${POSTGRES_CHECKPOINT_TIMEOUT:-20min}
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_compression=on
      - -c
      - synchronous_commit=off
      - -c
      - random_page_cost=1.1
      - -c
      - statement_timeout=300000
      - -c
      - idle_in_transaction_session_timeout=60000
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-55432}:5432"
    volumes:
      - business_os_postgres18_cluster:/var/lib/postgresql
    networks:
      - business_os_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    shm_size: "${POSTGRES_SHM_SIZE:-1g}"
    mem_limit: "${POSTGRES_MEMORY_LIMIT:-4608m}"
    cpus: "${POSTGRES_CPUS:-4.0}"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging: *service-logging

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-businessos}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-businessos-dev-password}"
      MINIO_LICENSE_FILE: "${MINIO_LICENSE_FILE:-/run/secrets/minio.license}"
      MINIO_API_REQUESTS_MAX: "${MINIO_API_REQUESTS_MAX:-1600}"
      MINIO_API_REQUESTS_DEADLINE: "${MINIO_API_REQUESTS_DEADLINE:-10s}"
    ports:
      - "${MINIO_BIND_HOST:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_BIND_HOST:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - business_os_minio:/data
      - type: bind
        source: ${MINIO_LICENSE_HOST_FILE:-../runtime/secrets/minio.license}
        target: /run/secrets/minio.license
        read_only: true
    networks:
      - business_os_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    mem_limit: "${MINIO_MEMORY_LIMIT:-1536m}"
    cpus: "${MINIO_CPUS:-1.5}"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging: *service-logging

  app:
    image: node:24-bookworm
    profiles: ["runtime", "postgres-runtime"]
    restart: unless-stopped
    working_dir: /app/backend
    environment:
      <<: *node-env
      WORKER_RUNTIME: docker
      NODE_OPTIONS: "--max-old-space-size=768"
    command: ["sh", "-lc", "set -e; cd /app/frontend; if [ ! -d node_modules/vite ] || [ ! -f node_modules/.package-lock.json ] || [ package.json -nt node_modules/.package-lock.json ] || [ package-lock.json -nt node_modules/.package-lock.json ]; then npm ci --no-audit --prefer-offline --loglevel=warn; fi; if [ ! -f dist/index.html ]; then npm run build; fi; cd /app/backend; if [ ! -d node_modules/cors ] || [ ! -f node_modules/pg/package.json ] || [ ! -f node_modules/.package-lock.json ] || [ package.json -nt node_modules/.package-lock.json ] || [ package-lock.json -nt node_modules/.package-lock.json ]; then npm ci --omit=dev --no-audit --prefer-offline --loglevel=warn; fi; npm run start"]
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${PORT:-4000}:4000"
    volumes:
      - ../../:/app
      - business_os_backend_node_modules:/app/backend/node_modules
      - business_os_frontend_node_modules:/app/frontend/node_modules
    networks:
      - business_os_internal
    depends_on:
      redis-queue:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    mem_limit: "${APP_MEMORY_LIMIT:-1024m}"
    cpus: "${APP_CPUS:-1.5}"
    stop_grace_period: 30s
    logging: *service-logging

  import-worker:
    image: node:24-bookworm
    profiles: ["runtime", "postgres-runtime"]
    restart: unless-stopped
    working_dir: /app/backend
    environment:
      <<: *node-env
      WORKER_RUNTIME: docker
      NODE_OPTIONS: "--max-old-space-size=768"
    command: ["sh", "-lc", "set -e; npm run worker:import"]
    volumes:
      - ../../:/app
      - business_os_backend_node_modules:/app/backend/node_modules
    networks:
      - business_os_internal
    depends_on:
      redis-queue:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      app:
        condition: service_healthy
    mem_limit: "${IMPORT_WORKER_MEMORY_LIMIT:-2560m}"
    cpus: "${IMPORT_WORKER_CPUS:-3.0}"
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep '[s]rc/workers/importWorker.js' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s
    logging: *service-logging

  media-worker:
    image: node:24-bookworm
    profiles: ["runtime", "postgres-runtime"]
    restart: unless-stopped
    working_dir: /app/backend
    environment:
      <<: *node-env
      WORKER_RUNTIME: docker
      NODE_OPTIONS: "--max-old-space-size=1024"
    command: ["sh", "-lc", "set -e; npm run worker:media"]
    volumes:
      - ../../:/app
      - business_os_backend_node_modules:/app/backend/node_modules
    networks:
      - business_os_internal
    depends_on:
      redis-queue:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      app:
        condition: service_healthy
    mem_limit: "${MEDIA_WORKER_MEMORY_LIMIT:-3072m}"
    cpus: "${MEDIA_WORKER_CPUS:-3.5}"
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep '[s]rc/workers/mediaWorker.js' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s
    logging: *service-logging

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["cloudflare-runtime"]
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "--loglevel", "warn", "run", "--token-file", "/run/secrets/cloudflare.token", "--url", "http://app:4000"]
    network_mode: "service:app"
    volumes:
      - type: bind
        source: ${CLOUDFLARE_TUNNEL_TOKEN_HOST_FILE:-../runtime/secrets/cloudflare-business-os-leangcosmetics.token}
        target: /run/secrets/cloudflare.token
        read_only: true
    depends_on:
      app:
        condition: service_healthy
    mem_limit: "${CLOUDFLARED_MEMORY_LIMIT:-256m}"
    cpus: "${CLOUDFLARED_CPUS:-0.5}"
    logging: *service-logging

volumes:
  business_os_redis_queue:
  # Preserved for old local scale-service installs that mounted Postgres 18 at
  # /var/lib/postgresql/data. Do not delete automatically; migration/doctor can
  # inspect it if a real Postgres cutover ever used this volume.
  business_os_postgres18:
  business_os_postgres18_cluster:
  business_os_minio:
  business_os_backend_node_modules:
  business_os_frontend_node_modules:

networks:
  business_os_internal:
    external: true
    name: business_os_internal
